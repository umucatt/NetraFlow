<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="icons/netraflow.ico" />
    <title>NetraFlow</title>
    <script>
      (function () {
        var defaultThemeMode = 'system';
        var defaultThemeStyle = 'default';
        var themeMode = defaultThemeMode;
        var themeStyle = defaultThemeStyle;
        var isThemeMode = function (value) {
          return value === 'light' || value === 'dark' || value === 'system';
        };
        var isThemeStyle = function (value) {
          return value === 'default' || value === 'nyaa';
        };
        var getSystemTheme = function () {
          try {
            return typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          } catch (_error) {
            return 'light';
          }
        };
        var getPrebootBackgroundColor = function (resolvedTheme, style) {
          if (style === 'nyaa') {
            return resolvedTheme === 'dark' ? '#18141b' : '#fff6fa';
          }

          return resolvedTheme === 'dark' ? '#171a1f' : '#f6f3ea';
        };

        try {
          var storedSettings = window.netraflowStorage
            ? window.netraflowStorage.getItem('netraflowGlobalSettings')
            : null;
          var parsedSettings = storedSettings ? JSON.parse(storedSettings) : null;

          if (parsedSettings && typeof parsedSettings === 'object') {
            if (isThemeMode(parsedSettings.themeMode)) {
              themeMode = parsedSettings.themeMode;
            }

            if (
              parsedSettings.nyaaThemeUnlocked === true &&
              isThemeStyle(parsedSettings.themeStyle)
            ) {
              themeStyle = parsedSettings.themeStyle;
            }
          }
        } catch (_error) {
          themeMode = defaultThemeMode;
          themeStyle = defaultThemeStyle;
        }

        var resolvedTheme = themeMode === 'system' ? getSystemTheme() : themeMode;
        var root = document.documentElement;

        root.dataset.themeMode = themeMode;
        root.dataset.theme = resolvedTheme;
        root.dataset.resolvedTheme = resolvedTheme;
        root.dataset.themeStyle = themeStyle;
        root.style.setProperty('color-scheme', resolvedTheme);
        root.style.setProperty(
          'background-color',
          getPrebootBackgroundColor(resolvedTheme, themeStyle)
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
