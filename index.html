<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'; script-src 'self' 'sha256-OxwRvhoJzPetfMbxQZbP/qxAnuR+KYnSWoVxdrHwLRw='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws:;"
    />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="icons/netraflow.svg" />
    <title>NetraFlow</title>
    <script>
      (function () {
        var defaultThemeMode = 'system';
        var defaultThemeStyle = 'default';
        var themeMode = defaultThemeMode;
        var themeStyle = defaultThemeStyle;
        var isThemeMode = function (value) {
          return value === 'light' || value === 'dark' || value === 'system';
        };
        var isThemeStyle = function (value) {
          return value === 'default' || value === 'nyaa';
        };
        var getSystemTheme = function () {
          try {
            return typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          } catch (_error) {
            return 'light';
          }
        };
        var getPrebootBackgroundColor = function (resolvedTheme, style) {
          if (style === 'nyaa') {
            return resolvedTheme === 'dark' ? '#18141b' : '#fff6fa';
          }

          return resolvedTheme === 'dark' ? '#171a1f' : '#f6f3ea';
        };

        try {
          var persistence = window.netraflowPersistence;
          var settingsResult = persistence ? persistence.readSettingsDocument() : null;
          var stateResult = persistence ? persistence.readStateDocument() : null;
          var settingsDocument =
            settingsResult && settingsResult.ok === true ? settingsResult.document : null;
          var stateDocument =
            stateResult && stateResult.ok === true ? stateResult.document : null;
          var parsedSettings =
            settingsDocument && typeof settingsDocument === 'object'
              ? settingsDocument.global
              : null;
          var personalization =
            stateDocument && typeof stateDocument === 'object'
              ? stateDocument.personalization
              : null;
          var nyaaThemeUnlocked =
            personalization &&
            typeof personalization === 'object' &&
            personalization.nyaaThemeUnlocked === true;

          if (parsedSettings && typeof parsedSettings === 'object') {
            if (isThemeMode(parsedSettings.themeMode)) {
              themeMode = parsedSettings.themeMode;
            }

            if (nyaaThemeUnlocked && isThemeStyle(parsedSettings.themeStyle)) {
              themeStyle = parsedSettings.themeStyle;
            }
          }
        } catch (_error) {
          themeMode = defaultThemeMode;
          themeStyle = defaultThemeStyle;
        }

        var resolvedTheme = themeMode === 'system' ? getSystemTheme() : themeMode;
        var root = document.documentElement;

        root.dataset.themeMode = themeMode;
        root.dataset.theme = resolvedTheme;
        root.dataset.resolvedTheme = resolvedTheme;
        root.dataset.themeStyle = themeStyle;
        root.style.setProperty('color-scheme', resolvedTheme);
        root.style.setProperty(
          'background-color',
          getPrebootBackgroundColor(resolvedTheme, themeStyle)
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
