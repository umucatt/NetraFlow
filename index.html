<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="icons/netraflow.ico" />
    <title>NetraFlow</title>
    <script>
      (function () {
        var themeMode = 'system';
        var getSystemTheme = function () {
          return typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        };

        try {
          var storedSettings = window.localStorage.getItem('netraflowGlobalSettings');
          var parsedSettings = storedSettings ? JSON.parse(storedSettings) : null;

          if (
            parsedSettings &&
            (parsedSettings.themeMode === 'light' ||
              parsedSettings.themeMode === 'dark' ||
              parsedSettings.themeMode === 'system')
          ) {
            themeMode = parsedSettings.themeMode;
          }
        } catch (_error) {
          themeMode = 'system';
        }

        var resolvedTheme = themeMode === 'system' ? getSystemTheme() : themeMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.style.setProperty('color-scheme', resolvedTheme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
