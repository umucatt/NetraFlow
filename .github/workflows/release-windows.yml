name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release environment
        id: release_env
        shell: pwsh
        run: |
          $packageJson = Get-Content -Raw -Path package.json | ConvertFrom-Json
          $version = [string]$packageJson.version

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "package.json version is missing."
          }

          $versionPattern = '\A(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)([-_][0-9A-Za-z](?:[0-9A-Za-z._-]*[0-9A-Za-z])?)?\z'
          $versionMatch = [regex]::Match($version, $versionPattern)

          if (-not $versionMatch.Success) {
            throw "package.json version is not a valid release version: $version"
          }

          $major = [int]$versionMatch.Groups[1].Value
          $suffix = $versionMatch.Groups[4].Value
          $isPrerelease = $major -eq 0 -or $suffix -match "(?i)beta|rc"
          $isPrereleaseText = if ($isPrerelease) { "true" } else { "false" }
          $releaseTag = "v$version"
          $installerName = "NetraFlow_${version}_Setup.exe"
          $portableName = "NetraFlow_${version}_Portable.zip"

          @(
            "RELEASE_VERSION=$version",
            "RELEASE_TAG=$releaseTag",
            "NETRAFLOW_RELEASE_TAG=$releaseTag",
            "IS_PRERELEASE=$isPrereleaseText",
            "INSTALLER_NAME=$installerName",
            "PORTABLE_NAME=$portableName"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          @(
            "release_version=$version",
            "release_tag=$releaseTag",
            "is_prerelease=$isPrereleaseText",
            "installer_name=$installerName",
            "portable_name=$portableName"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify release tag points to checkout
        shell: pwsh
        run: |
          $headCommit = (git rev-parse HEAD).Trim()

          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($headCommit)) {
            throw "Unable to resolve HEAD."
          }

          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne $env:RELEASE_TAG) {
            throw "Tag trigger $env:GITHUB_REF_NAME does not match package version tag $env:RELEASE_TAG."
          }

          $tagCommit = git rev-list -n 1 $env:RELEASE_TAG 2>$null

          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($tagCommit)) {
            throw "Required release tag $env:RELEASE_TAG does not exist. Create the tag on this commit before running the release workflow."
          }

          $tagCommit = $tagCommit.Trim()

          if ($tagCommit -ne $headCommit) {
            throw "Required release tag $env:RELEASE_TAG points to $tagCommit, expected checkout commit $headCommit."
          }

          Write-Host "Release tag $env:RELEASE_TAG points to checkout commit $headCommit."

      - name: Check release does not exist
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiPath = "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG"
          $output = gh api --include $apiPath 2>&1
          $exitCode = $LASTEXITCODE
          $outputText = ($output | Out-String)

          if ($exitCode -eq 0) {
            throw "Release $env:RELEASE_TAG already exists. Delete or resolve the existing Release before rerunning."
          }

          if ($outputText -match "HTTP/\S+\s+404" -or $outputText -match "\(HTTP 404\)") {
            Write-Host "No existing Release found for $env:RELEASE_TAG."
            exit 0
          }

          Write-Error "Unable to verify whether Release $env:RELEASE_TAG exists. gh api exited with $exitCode. Output: $outputText"
          exit 1

      - name: Release check
        run: npm run release:check -- --strict

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify Electron build outputs
        shell: pwsh
        run: |
          foreach ($buildOutput in @("dist-electron/main.js", "dist-electron/preload.js")) {
            if (-not (Test-Path -LiteralPath $buildOutput -PathType Leaf)) {
              throw "Electron build output is missing: $buildOutput"
            }

            $buildOutputItem = Get-Item -LiteralPath $buildOutput

            if ($buildOutputItem.Length -le 0) {
              throw "Electron build output is empty: $buildOutput"
            }
          }

      - name: Build installer
        run: npm run dist:installer

      - name: Build portable
        run: npm run dist:portable

      - name: Verify release artifacts and create SHA256SUMS
        id: artifacts
        run: npm run release:verify-artifacts

      - name: Create release notes
        id: release_notes
        run: node scripts/create-release-notes.mjs

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installerPath = "${{ steps.artifacts.outputs.installer_path }}"
          $portablePath = "${{ steps.artifacts.outputs.portable_path }}"
          $releaseNotesPath = "${{ steps.release_notes.outputs.release_notes_path }}"

          foreach ($assetPath in @($installerPath, $portablePath)) {
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
              throw "Release asset is missing: $assetPath"
            }
          }

          if (-not (Test-Path -LiteralPath $releaseNotesPath -PathType Leaf)) {
            throw "Release notes file is missing: $releaseNotesPath"
          }

          $arguments = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            $installerPath,
            $portablePath,
            "--title",
            "NetraFlow $env:RELEASE_VERSION",
            "--draft",
            "--notes-file",
            $releaseNotesPath
          )

          if ($env:IS_PRERELEASE -eq "true") {
            $arguments += "--prerelease"
          } elseif ($env:IS_PRERELEASE -ne "false") {
            throw "IS_PRERELEASE must be true or false, got $env:IS_PRERELEASE"
          }

          & gh @arguments

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Draft Release creation or asset upload failed. This workflow does not delete draft Releases or tags. Inspect and clean up any partial draft manually before rerunning."
            exit $LASTEXITCODE
          }
